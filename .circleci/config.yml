version: 2.1

orbs:
  test-visibility-circleci-orb: manueltest/test-visibility-circleci-orb@1.0.5
jobs:
  build: 
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.19.1
    steps:
      - checkout
      - run:
          name: Building Code
          command: go build ./main/...
  test_additions: 
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.19.1
    steps:
      - checkout
      - run:
          name: Testing Additions
          command: go test ./main/additions/...
  test_subtractions: 
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.19.1
    steps:
      - checkout
      - run:
          name: Testing Subtractions
          command: go test ./main/subtractions/...
  test_python:
    working_directory: ~/repo
    docker:
      - image: python:latest
    steps:
      - checkout
      - run: 'echo KEY: $DD_API_KEY'
      - run: 'echo -n $DD_API_KEY | base64'
      - run: pip install pytest
      - run: 'echo KEY: $DD_API_KEY'
      - test-visibility-circleci-orb/autoinstrument:
          languages: python
          service: python-autoinstrumentation
          site: datad0g.com
      - run: 'echo KEY: $DD_API_KEY'
      - run:
          name: Testing Python
          command: |
            echo $DD_SITE
            echo $DD_API_KEY
            pytest
  custom_span: 
    working_directory: ~/repo
    docker:
      - image: cimg/node:21.6.1
    steps:
      - checkout
      - run: 'echo KEY: $DD_API_KEY'
      - run:
          name: Adding custom span
          command:
            |
            echo $DD_API_KEY
            npm install -g @datadog/datadog-ci
            export DD_SITE=datad0g.com
            datadog-ci trace --name "Say Hello" -- echo "Hello World"

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
      - test_additions:
          requires:
            - build
      - test_subtractions:
          requires:
            - build
      - test_python:
          requires:
            - build
      - custom_span:
          requires:
            - build
