version: 2.1
jobs:
  build: 
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.19.1
    steps:
      - checkout
      - run:
          name: Building Code
          command: go build ./main/...
  test_additions: 
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.19.1
    steps:
      - checkout
      - run:
          name: Testing Additions
          command: go test ./main/additions/...
  test_subtractions: 
    working_directory: ~/repo
    docker:
      - image: cimg/go:1.19.1
    steps:
      - checkout
      - run:
          name: Testing Subtractions
          command: go test ./main/subtractions/...
  custom_span: 
    working_directory: ~/repo
    docker:
      - image: cimg/node:21.6.1
    steps:
      - checkout
      - run:
          name: Adding custom span
          command:
            |
            npm install -g @datadog/datadog-ci
            export DD_SITE=datad0g.com
            datadog-ci trace --name "Say Hello" -- echo "Hello World"

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
      - test_additions:
          requires:
            - build
      - test_subtractions:
          requires:
            - build
      - custom_span:
          requires:
            - build
